name: Feature Request
description: Suggest a feature for ComfyInject
title: "[Feature]: "
labels: ["enhancement"]

body:

  - type: textarea
    attributes:
      label: Describe the feature
      description: What would you like to see added?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Why would this be useful?

  - type: textarea
    attributes:
      label: Additional context
      description: Examples, screenshots, or explanation